<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>audio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0812; 
            --panel-bg: #141120;
            --text-color: #ffffff;
            
            /* Dynamic Theme Variables */
            --accent-color: #7c3aed; 
            --accent-rgb: 124, 58, 237; 
            
            --white-key: #ffffff;
            --black-key: #2c2c2c;
            --white-key-width: 34px;
            --black-key-width: 22px;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Inter', Helvetica, sans-serif;
            background-color: var(--bg-color);
            
            background-image: 
                linear-gradient(45deg, #110e1c 25%, transparent 25%, transparent 75%, #110e1c 75%, #110e1c),
                linear-gradient(45deg, #110e1c 25%, transparent 25%, transparent 75%, #110e1c 75%, #110e1c);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            animation: scrollBg 15s linear infinite;

            color: var(--text-color);
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden;
            text-transform: lowercase;
        }

        @keyframes scrollBg {
            0% { background-position: 0 0, 30px 30px; }
            100% { background-position: 60px 60px, 90px 90px; }
        }

        body.dragover {
            background-color: #1a1528; border: 5px dashed var(--accent-color);
        }

        /* Theme Switcher */
        .theme-switcher {
            position: absolute; top: 20px; left: 20px; display: flex; gap: 10px; z-index: 20;
        }
        .theme-btn {
            width: 16px; height: 16px; border-radius: 50%; cursor: pointer;
            border: 2px solid transparent; transition: 0.2s; opacity: 0.5;
        }
        .theme-btn:hover, .theme-btn.active {
            opacity: 1; border-color: #fff; transform: scale(1.1);
        }

        header { text-align: center; margin: 15px 0; z-index: 10; }
        h1 { margin: 0 0 5px 0; font-weight: 300; font-size: 2.5rem; letter-spacing: 4px; color: var(--accent-color);}
        p { margin: 0; color: #888888; font-size: 13px;}

        /* UI Panels */
        .dashboard {
            display: flex; gap: 20px; width: 95%; max-width: 1200px; margin-bottom: 15px; z-index: 10;
        }

        .panel {
            background: var(--panel-bg); padding: 20px; border-radius: 12px;
            border: 1px solid #231d36; flex: 1; display: flex; flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .panel h3 { 
            margin: 0 0 15px 0; font-size: 13px; font-weight: 600; color: #999; 
            display: flex; align-items: center; justify-content: space-between;
        }

        .sound-link {
            font-size: 11px; color: var(--accent-color); text-decoration: none;
            font-weight: 400; border-bottom: 1px solid transparent; transition: 0.2s;
        }
        .sound-link:hover { border-bottom: 1px solid var(--accent-color); }

        /* Controls */
        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .control-group { display: flex; flex-direction: column; justify-content: center;}
        .control-group label { font-size: 11px; color: #aaa; margin-bottom: 6px; }
        
        select {
            width: 100%; background: #0e0b16; color: var(--accent-color); text-transform: lowercase;
            border: 1px solid #332b4a; border-radius: 6px; padding: 8px; outline: none; font-family: 'Inter', sans-serif;
        }

        /* Custom Cross-Browser Sliders */
        input[type="range"] { -webkit-appearance: none; appearance: none; width: 100%; background: transparent; margin: 5px 0; outline: none; }
        input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: #231d36; border-radius: 3px; }
        input[type="range"]::-webkit-slider-thumb {
            height: 16px; width: 16px; border-radius: 50%; background: var(--accent-color); cursor: pointer;
            -webkit-appearance: none; margin-top: -5px; box-shadow: 0 0 10px rgba(var(--accent-rgb), 0.4);
        }
        input[type="range"]::-moz-range-track { width: 100%; height: 6px; cursor: pointer; background: #231d36; border-radius: 3px; }
        input[type="range"]::-moz-range-thumb {
            height: 16px; width: 16px; border-radius: 50%; background: var(--accent-color); cursor: pointer; border: none;
            box-shadow: 0 0 10px rgba(var(--accent-rgb), 0.4);
        }

        /* Sequencer & Buttons */
        textarea {
            width: 100%; height: 60px; background: #0a0812; color: #fff;
            border: 1px solid #332b4a; border-radius: 8px; padding: 10px;
            font-family: monospace; resize: none; outline: none; box-sizing: border-box; text-transform: none; 
        }

        .btn-group { display: flex; gap: 10px; margin-top: auto; }
        button {
            flex: 1; padding: 10px; background: #231d36; color: white; border: none;
            border-radius: 6px; cursor: pointer; font-weight: 600; font-family: 'Inter', sans-serif;
            transition: 0.2s; text-transform: lowercase;
        }
        button:hover { background: var(--accent-color); color: white; }
        #stop-btn { background: #3a1a1a; color: #ff8888; } 
        #stop-btn:hover { background: #ff4444; color: white;}

        .bend-indicator {
            background: #0a0812; padding: 6px 10px; border-radius: 6px;
            border: 1px solid #332b4a; font-family: monospace; color: #ccc; text-align: center;
        }

        /* Visualizer */
        canvas {
            width: 95%; max-width: 1200px; height: 100px; background: #05040a;
            border-radius: 12px; box-shadow: 0 0 30px rgba(var(--accent-rgb), 0.1); margin-bottom: 20px;
            z-index: 10; border: 1px solid #1a1528;
        }

        /* Keyboard */
        .keyboard-wrapper { width: 95vw; max-width: 1300px; overflow-x: auto; display: flex; justify-content: center; padding-bottom: 10px; z-index: 10;}
        .keyboard { display: flex; position: relative; user-select: none; height: 160px; }
        .key { border-radius: 0 0 6px 6px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 10px; font-size: 11px; font-weight: 600; cursor: pointer; box-sizing: border-box; text-transform: none; }
        .key.white { width: var(--white-key-width); height: 160px; background: var(--white-key); border: 1px solid #ddd; color: #444; z-index: 1; }
        .key.white.active { background: #d4d4d4; height: 156px; }
        .key.black { width: var(--black-key-width); height: 100px; background: var(--black-key); color: #ccc; position: absolute; z-index: 2; top: 0; border: 1px solid #111; box-shadow: 0 4px 6px rgba(0,0,0,0.6); }
        .key.black.active { background: #4a4a4a; height: 98px; }
        
        #overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 100; color: var(--accent-color); font-size: 24px; display: none; pointer-events: none; }
        body.dragover #overlay { display: flex; }
    </style>
</head>
<body>

    <div class="theme-switcher">
        <div class="theme-btn active" data-color="#7c3aed" data-rgb="124, 58, 237" style="background: #7c3aed;"></div>
        <div class="theme-btn" data-color="#ef4444" data-rgb="239, 68, 68" style="background: #ef4444;"></div>
        <div class="theme-btn" data-color="#1db954" data-rgb="29, 185, 84" style="background: #1db954;"></div>
        <div class="theme-btn" data-color="#ffffff" data-rgb="255, 255, 255" style="background: #ffffff;"></div>
    </div>

    <div id="overlay">drop audio file here to load custom sample</div>

    <header>
        <h1>audio</h1>
        <p>type to play. drop samples. paste sheet music to auto-play.</p>
    </header>

    <div class="dashboard">
        <div class="panel">
            <h3>
                <span>sound engine & effects</span>
                <a href="https://freewavesamples.com/midi-instruments" target="_blank" class="sound-link">find sounds here!</a>
            </h3>
            <div class="controls-grid">
                <div class="control-group">
                    <label>instrument patch</label>
                    <select id="preset-selector">
                        <option value="sine">preset 1: sine synth</option>
                        <option value="square">preset 2: retro square</option>
                        <option value="sawtooth">preset 3: gritty sawtooth</option>
                        <option value="triangle">preset 4: smooth triangle</option>
                        <option value="organ">preset 5: classic organ</option>
                        <option value="sampler" id="sampler-option" disabled>custom sample (drag & drop)</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>transpose (tone shift)</label>
                    <input type="range" id="transpose" min="-12" max="12" value="0">
                </div>
                <div class="control-group">
                    <label>filter cutoff (tone)</label>
                    <input type="range" id="filter" min="200" max="20000" value="20000">
                </div>
                <div class="control-group">
                    <label>echo amount</label>
                    <input type="range" id="echo" min="0" max="1" step="0.05" value="0">
                </div>
                <div class="control-group">
                    <label>reverb amount</label>
                    <input type="range" id="reverb" min="0" max="1" step="0.05" value="0">
                </div>
                <div class="control-group">
                    <label>wheel status</label>
                    <div class="bend-indicator" id="bend-ui">bend: 0 st</div>
                </div>
            </div>
        </div>

        <div class="panel">
            <h3>
                <span>auto-play sheet music</span>
                <a href="https://virtualpiano.net/music-sheets/" target="_blank" class="sound-link">find sheet music here!</a>
            </h3>
            <textarea id="sheet-music" placeholder="paste sheet music here... e.g., [^E] T i E T i"></textarea>
            <div class="controls-grid" style="margin-top: 15px;">
                <div class="control-group">
                    <label>tempo (tick speed)</label>
                    <input type="range" id="tempo" min="50" max="400" value="180">
                </div>
                <div class="btn-group">
                    <button id="play-btn">play</button>
                    <button id="stop-btn">stop</button>
                    <button id="clean-btn">clean (remove breaks)</button>
                </div>
            </div>
        </div>
    </div>

    <canvas id="visualizer"></canvas>

    <div class="keyboard-wrapper">
        <div id="keyboard" class="keyboard"></div>
    </div>

    <script>
        let audioCtx, analyser, masterGain;
        let filterNode, delayNode, feedbackNode, echoGain, convolverNode, reverbGain;
        let customAudioBuffer = null;
        let isAutoPlaying = false;
        
        const activeNotes = {}; 
        let bendAmount = 0; 
        let wheelTimeout;

        // Visualizer color tracking
        let currentRgb = "124, 58, 237";
        let currentHex = "#7c3aed";

        const baseFreq = 65.41; // C2

        const layoutSpec = [
            { k: '1', t: 'w', note: 0 }, { k: '!', t: 'b', note: 1 }, { k: '2', t: 'w', note: 2 }, { k: '@', t: 'b', note: 3 },
            { k: '3', t: 'w', note: 4 }, { k: '4', t: 'w', note: 5 }, { k: '$', t: 'b', note: 6 }, { k: '5', t: 'w', note: 7 },
            { k: '%', t: 'b', note: 8 }, { k: '6', t: 'w', note: 9 }, { k: '^', t: 'b', note: 10 }, { k: '7', t: 'w', note: 11 },
            { k: '8', t: 'w', note: 12 }, { k: '*', t: 'b', note: 13 }, { k: '9', t: 'w', note: 14 }, { k: '(', t: 'b', note: 15 },
            { k: '0', t: 'w', note: 16 }, { k: 'q', t: 'w', note: 17 }, { k: 'Q', t: 'b', note: 18 }, { k: 'w', t: 'w', note: 19 },
            { k: 'W', t: 'b', note: 20 }, { k: 'e', t: 'w', note: 21 }, { k: 'E', t: 'b', note: 22 }, { k: 'r', t: 'w', note: 23 },
            { k: 't', t: 'w', note: 24 }, { k: 'T', t: 'b', note: 25 }, { k: 'y', t: 'w', note: 26 }, { k: 'Y', t: 'b', note: 27 },
            { k: 'u', t: 'w', note: 28 }, { k: 'i', t: 'w', note: 29 }, { k: 'I', t: 'b', note: 30 }, { k: 'o', t: 'w', note: 31 },
            { k: 'O', t: 'b', note: 32 }, { k: 'p', t: 'w', note: 33 }, { k: 'P', t: 'b', note: 34 }, { k: 'a', t: 'w', note: 35 },
            { k: 's', t: 'w', note: 36 }, { k: 'S', t: 'b', note: 37 }, { k: 'd', t: 'w', note: 38 }, { k: 'D', t: 'b', note: 39 },
            { k: 'f', t: 'w', note: 40 }, { k: 'g', t: 'w', note: 41 }, { k: 'G', t: 'b', note: 42 }, { k: 'h', t: 'w', note: 43 },
            { k: 'H', t: 'b', note: 44 }, { k: 'j', t: 'w', note: 45 }, { k: 'J', t: 'b', note: 46 }, { k: 'k', t: 'w', note: 47 },
            { k: 'l', t: 'w', note: 48 }, { k: 'L', t: 'b', note: 49 }, { k: 'z', t: 'w', note: 50 }, { k: 'Z', t: 'b', note: 51 },
            { k: 'x', t: 'w', note: 52 }, { k: 'c', t: 'w', note: 53 }, { k: 'C', t: 'b', note: 54 }, { k: 'v', t: 'w', note: 55 },
            { k: 'V', t: 'b', note: 56 }, { k: 'b', t: 'w', note: 57 }, { k: 'B', t: 'b', note: 58 }, { k: 'n', t: 'w', note: 59 },
            { k: 'm', t: 'w', note: 60 }
        ];

        const keyMap = {}; 
        const keyboardContainer = document.getElementById('keyboard');
        let whiteKeyCount = 0;
        const wWidth = 34; const bWidth = 22; 

        layoutSpec.forEach(item => {
            keyMap[item.k] = item.note;
            const keyDiv = document.createElement('div');
            keyDiv.className = `key ${item.t === 'w' ? 'white' : 'black'}`;
            keyDiv.dataset.index = item.note;
            keyDiv.innerText = item.k;

            if (item.t === 'w') {
                keyboardContainer.appendChild(keyDiv);
                whiteKeyCount++;
            } else {
                const leftPos = (whiteKeyCount * wWidth) - (bWidth / 2);
                keyDiv.style.left = `${leftPos}px`;
                keyboardContainer.appendChild(keyDiv);
            }
        });
        keyboardContainer.style.width = `${whiteKeyCount * wWidth}px`;

        // Theme Switcher Logic
        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                
                currentHex = e.target.dataset.color;
                currentRgb = e.target.dataset.rgb;
                
                document.documentElement.style.setProperty('--accent-color', currentHex);
                document.documentElement.style.setProperty('--accent-rgb', currentRgb);
            });
        });

        function createReverbIR(ctx) {
            const length = ctx.sampleRate * 2.5; 
            const buffer = ctx.createBuffer(2, length, ctx.sampleRate);
            for (let c = 0; c < 2; c++) {
                const data = buffer.getChannelData(c);
                for (let i = 0; i < length; i++) {
                    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 4);
                }
            }
            return buffer;
        }

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                masterGain = audioCtx.createGain();
                masterGain.gain.value = 0.4;
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 2048; analyser.smoothingTimeConstant = 0.88;
                
                filterNode = audioCtx.createBiquadFilter();
                filterNode.type = 'lowpass';
                filterNode.frequency.value = 20000;

                delayNode = audioCtx.createDelay();
                delayNode.delayTime.value = 0.3;
                feedbackNode = audioCtx.createGain();
                feedbackNode.gain.value = 0.4; 
                echoGain = audioCtx.createGain();
                echoGain.gain.value = 0;
                delayNode.connect(feedbackNode);
                feedbackNode.connect(delayNode);

                convolverNode = audioCtx.createConvolver();
                convolverNode.buffer = createReverbIR(audioCtx);
                reverbGain = audioCtx.createGain();
                reverbGain.gain.value = 0;

                masterGain.connect(filterNode); 
                filterNode.connect(analyser); 
                
                filterNode.connect(delayNode);
                delayNode.connect(echoGain);
                echoGain.connect(analyser);

                filterNode.connect(convolverNode);
                convolverNode.connect(reverbGain);
                reverbGain.connect(analyser);

                analyser.connect(audioCtx.destination);
                drawVisualizer();
            }
        }

        const UI = {
            preset: document.getElementById('preset-selector'),
            transpose: document.getElementById('transpose'),
            filter: document.getElementById('filter'),
            echo: document.getElementById('echo'),
            reverb: document.getElementById('reverb'),
            bend: document.getElementById('bend-ui')
        };

        UI.filter.addEventListener('input', e => { if(filterNode) filterNode.frequency.value = e.target.value; });
        UI.echo.addEventListener('input', e => { if(echoGain) echoGain.gain.value = e.target.value; });
        UI.reverb.addEventListener('input', e => { if(reverbGain) reverbGain.gain.value = e.target.value; });

        function applyBend() {
            if(!audioCtx) return;
            const bendRatio = Math.pow(2, bendAmount / 12);
            UI.bend.innerText = `bend: ${bendAmount > 0 ? '+' : ''}${bendAmount.toFixed(1)} st`;

            for (let id in activeNotes) {
                const note = activeNotes[id];
                if (note.source.frequency && note.baseFreq) {
                    note.source.frequency.setTargetAtTime(note.baseFreq * bendRatio, audioCtx.currentTime, 0.05);
                } else if (note.source.playbackRate && note.baseRate) {
                    note.source.playbackRate.setTargetAtTime(note.baseRate * bendRatio, audioCtx.currentTime, 0.05);
                }
            }
        }

        window.addEventListener('wheel', (e) => {
            e.preventDefault(); initAudio();
            bendAmount += e.deltaY * -0.005;
            bendAmount = Math.max(-2, Math.min(2, bendAmount)); 
            applyBend();

            clearTimeout(wheelTimeout);
            wheelTimeout = setTimeout(() => { bendAmount = 0; applyBend(); }, 150);
        }, { passive: false });

        function playNote(rawNoteIndex, trackingId) {
            initAudio();
            
            if (activeNotes[trackingId]) {
                stopNote(trackingId, rawNoteIndex, 0.02);
            }

            const transposeOffset = parseInt(UI.transpose.value);
            const noteIndex = rawNoteIndex + transposeOffset;
            const mode = UI.preset.value;
            const bendRatio = Math.pow(2, bendAmount / 12);
            
            const noteGain = audioCtx.createGain();
            noteGain.connect(masterGain);
            noteGain.gain.setValueAtTime(0, audioCtx.currentTime);
            noteGain.gain.linearRampToValueAtTime(1, audioCtx.currentTime + 0.015);

            let source;
            let currentBaseFreq, currentBaseRate;

            if (mode === 'sampler' && customAudioBuffer) {
                currentBaseRate = Math.pow(2, (noteIndex - 30) / 12);
                source = audioCtx.createBufferSource();
                source.buffer = customAudioBuffer;
                source.playbackRate.value = currentBaseRate * bendRatio;
                source.connect(noteGain);
                source.start();
            } else {
                currentBaseFreq = baseFreq * Math.pow(2, noteIndex / 12);
                source = audioCtx.createOscillator();
                source.frequency.value = currentBaseFreq * bendRatio;

                if (mode === 'organ') {
                    const wave = audioCtx.createPeriodicWave(
                        new Float32Array([0, 1, 0.5, 0.25, 0.1]), 
                        new Float32Array([0, 0, 0, 0, 0])
                    );
                    source.setPeriodicWave(wave);
                } else {
                    source.type = mode; 
                }
                source.connect(noteGain);
                source.start();
            }

            activeNotes[trackingId] = { source, noteGain, baseFreq: currentBaseFreq, baseRate: currentBaseRate };
            
            const keyElement = document.querySelector(`.key[data-index="${rawNoteIndex}"]`);
            if(keyElement) keyElement.classList.add('active');
        }

        function stopNote(trackingId, rawNoteIndex, releaseTime = 0.3) {
            if (!activeNotes[trackingId]) return;

            const { source, noteGain } = activeNotes[trackingId];
            noteGain.gain.cancelScheduledValues(audioCtx.currentTime);
            noteGain.gain.setValueAtTime(noteGain.gain.value, audioCtx.currentTime);
            noteGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + releaseTime);
            source.stop(audioCtx.currentTime + releaseTime);
            
            delete activeNotes[trackingId];
            
            const keyElement = document.querySelector(`.key[data-index="${rawNoteIndex}"]`);
            if(keyElement) keyElement.classList.remove('active');
        }

        const sleep = ms => new Promise(r => setTimeout(r, ms));

        document.getElementById('clean-btn').addEventListener('click', () => {
            const sheet = document.getElementById('sheet-music');
            sheet.value = sheet.value.replace(/(\r\n|\n|\r)/gm, " ");
        });

        // Refined Sequencer Timing Loop
        document.getElementById('play-btn').addEventListener('click', async () => {
            initAudio();
            const sheet = document.getElementById('sheet-music').value;
            if (!sheet) return;
            
            isAutoPlaying = true;
            let i = 0;

            while (i < sheet.length && isAutoPlaying) {
                const char = sheet[i];
                const tick = parseInt(document.getElementById('tempo').value);

                if (char === '[') {
                    i++;
                    const chordNotes = [];
                    while (i < sheet.length && sheet[i] !== ']') {
                        if (keyMap[sheet[i]] !== undefined) chordNotes.push(keyMap[sheet[i]]);
                        i++;
                    }
                    chordNotes.forEach(nIndex => {
                        const tId = `auto_${nIndex}`;
                        playNote(nIndex, tId);
                        setTimeout(() => stopNote(tId, nIndex, 0.1), tick * 1.5);
                    });
                    await sleep(tick);
                    
                } else if (char === '|') {
                    await sleep(tick * 2);
                } else if (char === ' ') {
                    await sleep(tick);
                } else if (char === '\n') {
                    await sleep(1000); // 1 second pause for uncleaned line-breaks
                } else if (char !== '\r') { // Ignore carriage returns
                    const noteIndex = keyMap[char];
                    if (noteIndex !== undefined) {
                        const tId = `auto_${noteIndex}`;
                        playNote(noteIndex, tId);
                        setTimeout(() => stopNote(tId, noteIndex, 0.1), tick * 1.5);
                    }
                    await sleep(tick);
                }
                i++;
            }
            isAutoPlaying = false;
        });

        document.getElementById('stop-btn').addEventListener('click', () => { isAutoPlaying = false; });

        const canvas = document.getElementById('visualizer');
        const canvasCtx = canvas.getContext('2d');
        canvas.width = 1200; canvas.height = 100;

        function drawVisualizer() {
            requestAnimationFrame(drawVisualizer);
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            canvasCtx.fillStyle = '#05040a';
            canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

            const gradient = canvasCtx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, `rgba(${currentRgb}, 0.8)`);
            gradient.addColorStop(1, `rgba(${currentRgb}, 0.0)`);

            canvasCtx.beginPath();
            canvasCtx.moveTo(0, canvas.height);

            const sliceWidth = canvas.width / bufferLength;
            let x = 0;
            for (let i = 0; i < bufferLength; i++) {
                const v = dataArray[i] / 255.0;
                const y = canvas.height - (v * canvas.height * 0.85); 
                if (i === 0) canvasCtx.moveTo(x, y);
                else canvasCtx.lineTo(x, y);
                x += sliceWidth;
            }
            canvasCtx.lineTo(canvas.width, canvas.height);
            canvasCtx.lineTo(0, canvas.height);
            canvasCtx.closePath();

            canvasCtx.fillStyle = gradient; canvasCtx.fill();
            canvasCtx.shadowBlur = 15; canvasCtx.shadowColor = currentHex;
            canvasCtx.lineWidth = 2; canvasCtx.strokeStyle = '#ffffff';
            canvasCtx.stroke(); canvasCtx.shadowBlur = 0; 
        }

        window.addEventListener('keydown', (e) => {
            if (e.repeat || e.key === 'Shift' || document.activeElement.tagName === 'TEXTAREA') return;
            const noteIndex = keyMap[e.key];
            if (noteIndex !== undefined) playNote(noteIndex, e.code);
        });

        window.addEventListener('keyup', (e) => {
            if (activeNotes[e.code]) {
                const rawNote = layoutSpec.find(x => x.k === e.key)?.note || layoutSpec.find(x => x.k === e.key.toLowerCase())?.note;
                stopNote(e.code, rawNote, 0.3); 
            }
        });

        const kb = document.getElementById('keyboard');
        kb.addEventListener('mousedown', e => { if(e.target.classList.contains('key')) playNote(parseInt(e.target.dataset.index), `m_${e.target.dataset.index}`); });
        kb.addEventListener('mouseup', e => { if(e.target.classList.contains('key')) stopNote(`m_${e.target.dataset.index}`, parseInt(e.target.dataset.index), 0.3); });
        kb.addEventListener('mouseleave', e => { if(e.target.classList.contains('key')) stopNote(`m_${e.target.dataset.index}`, parseInt(e.target.dataset.index), 0.3); });

        const dropZone = document.body;
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault(); dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('audio/')) {
                initAudio(); 
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    customAudioBuffer = await audioCtx.decodeAudioData(ev.target.result);
                    const sel = document.getElementById('sampler-option');
                    sel.disabled = false; sel.text = `sample: ${file.name.substring(0, 15)}...`;
                    UI.preset.value = 'sampler';
                };
                reader.readAsArrayBuffer(file);
            }
        });
    </script>
</body>
</html>
